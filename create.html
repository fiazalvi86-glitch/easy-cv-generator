<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate CV Maker - Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }

        /* Navigation Tabs for Mobile */
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #666; }
        .tab.active { color: #2563eb; border-bottom: 3px solid #2563eb; }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .editor { width: 40%; background: #fff; padding: 20px; overflow-y: auto; border-right: 1px solid #ddd; }
        .preview { width: 60%; background: #525659; overflow-y: auto; padding: 40px 20px; display: flex; justify-content: center; }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; overflow: visible; }
            .editor, .preview { width: 100%; height: auto; overflow: visible; }
            .preview { display: none; padding: 10px; background: #eee; }
            .preview.active-tab { display: flex; }
            .editor.active-tab { display: block; }
        }

        /* Form Styling */
        h2 { margin-bottom: 15px; color: #333; }
        .group { background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #2563eb; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #1e40af; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }

        /* --- CV DESIGN (A4) --- */
        #cv-box { background: #fff; width: 210mm; min-height: 296mm; padding: 0; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.3); }
        
        /* Design 1: Sidebar (Modern) */
        .layout-sidebar { display: grid; grid-template-columns: 35% 65%; min-height: 296mm; }
        .sidebar { background: #1e293b; color: #fff; padding: 20mm 10mm; }
        .content { padding: 20mm 15mm; }
        
        /* Other Designs Classes */
        .layout-classic { padding: 20mm; border-top: 15px solid #1e40af; }
        .layout-minimal { padding: 20mm; text-align: center; }
        .layout-exec { padding: 20mm; border-left: 15mm solid #000; }
        .layout-clean { padding: 20mm; background: #fafafa; }
        .layout-tech { padding: 20mm; border: 3px solid #2563eb; }

        .photo-circ { width: 120px; height: 120px; border-radius: 10px; object-fit: cover; border: 3px solid #ffc107; margin-bottom: 20px; background: #ddd; display: block; }
        .h-line { display: flex; align-items: center; gap: 10px; color: #ffc107; font-weight: bold; margin: 20px 0 10px; text-transform: uppercase; }
        .h-line hr { flex: 1; border: 0; border-top: 1px solid #ddd; opacity: 0.3; }
        .text-p { font-size: 13px; line-height: 1.6; color: #444; white-space: pre-line; margin-bottom: 10px; }

        .dl-btn { width: 100%; padding: 15px; background: #059669; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; }
        #ad-box { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; color: #fff; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" onclick="showTab('edit', this)">1. Details</div>
    <div class="tab" onclick="showTab('view', this)">2. Preview</div>
</div>

<div class="main-container">
    <div class="editor active-tab" id="edit-sect">
        <h2>CV Details</h2>
        <div class="group">
            <label>Design Style</label>
            <select id="set-design" onchange="update()">
                <option value="sidebar">1. Modern Sidebar</option>
                <option value="classic">2. Classic Navy</option>
                <option value="minimal">3. Minimalist</option>
                <option value="exec">4. Executive Gold</option>
                <option value="clean">5. Clean Grey</option>
                <option value="tech">6. Tech Bold</option>
            </select>
            <label>Profile Image</label>
            <input type="file" accept="image/*" onchange="handleImg(event)">
        </div>

        <div class="group">
            <label>Personal Info</label>
            <input type="text" id="name" placeholder="Full Name" oninput="update()">
            <input type="text" id="fname" placeholder="Father Name" oninput="update()">
            <input type="text" id="title" placeholder="Job Title (e.g. Accountant)" oninput="update()">
            <input type="text" id="phone" placeholder="Phone Number" oninput="update()">
            <input type="text" id="email" placeholder="Email Address" oninput="update()">
            <input type="text" id="addr" placeholder="Address / City" oninput="update()">
            <input type="text" id="cnic" placeholder="CNIC (Optional)" oninput="update()">
        </div>

        <div class="group">
            <label>Profile Objective</label>
            <textarea id="obj" rows="3" placeholder="I am a motivated..." oninput="update()"></textarea>
        </div>

        <div class="group">
            <label>Education & Experience</label>
            <textarea id="edu" rows="3" placeholder="Degree - School - Year" oninput="update()"></textarea>
            <textarea id="exp" rows="3" placeholder="Job - Company - Duration" oninput="update()"></textarea>
        </div>

        <div class="group">
            <label>Skills, Projects & Languages</label>
            <input type="text" id="skills" placeholder="Skills (Word, Excel, Python)" oninput="update()">
            <input type="text" id="proj" placeholder="Project Name - Brief" oninput="update()">
            <input type="text" id="cert" placeholder="Certificates" oninput="update()">
            <input type="text" id="lang" placeholder="Languages" oninput="update()">
        </div>

        <button class="dl-btn" onclick="startDL()">Download PDF</button>
        <div style="height: 50px;"></div>
    </div>

    <div class="preview" id="view-sect">
        <div id="cv-box">
            </div>
    </div>
</div>

<div id="ad-box">
    <div style="background: white; color: #000; padding: 30px; border-radius: 10px; text-align: center; width: 90%; max-width: 350px;">
        <h3>Processing PDF...</h3>
        <div style="height: 200px; background: #eee; margin: 20px 0; border: 1px dashed #999; display: flex; align-items: center; justify-content: center;">Ad Slot</div>
        <button id="dl-final" style="display: none; padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 5px;" onclick="genPDF()">Save Now</button>
    </div>
</div>

<script>
    let imgData = "";

    function showTab(t, btn) {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        if(t === 'edit') {
            document.getElementById('edit-sect').classList.add('active-tab');
            document.getElementById('view-sect').classList.remove('active-tab');
        } else {
            document.getElementById('edit-sect').classList.remove('active-tab');
            document.getElementById('view-sect').classList.add('active-tab');
        }
    }

    function handleImg(e) {
        const r = new FileReader();
        r.onload = () => { imgData = r.result; update(); };
        r.readAsDataURL(e.target.files[0]);
    }

    function update() {
        const d = (id) => document.getElementById(id).value;
        const style = d('set-design');
        const box = document.getElementById('cv-box');
        
        const photo = imgData ? `<img src="${imgData}" class="photo-circ">` : `<div class="photo-circ" style="display:flex;align-items:center;justify-content:center;color:#999">No Photo</div>`;
        
        let html = '';

        if(style === 'sidebar') {
            box.className = 'layout-sidebar';
            html = `
                <div class="sidebar">
                    ${photo}
                    <div class="h-line">CONTACT <hr></div>
                    <p class="text-p" style="color:#cbd5e1; font-size:11px;">${d('phone')}\n${d('email')}\n${d('addr')}</p>
                    ${d('cnic') ? `<p class="text-p" style="color:#ffc107; font-size:11px;">CNIC: ${d('cnic')}</p>` : ''}
                    <div class="h-line">SKILLS <hr></div>
                    <p class="text-p" style="color:#cbd5e1; font-size:11px;">${d('skills')}</p>
                    <div class="h-line">LANGUAGES <hr></div>
                    <p class="text-p" style="color:#cbd5e1; font-size:11px;">${d('lang')}</p>
                </div>
                <div class="content">
                    <h1 style="font-size:32px; color:#1e293b;">${d('name') || 'Your Name'}</h1>
                    <p style="font-size:18px; color:#64748b;">${d('title') || 'Job Title'}</p>
                    ${d('fname') ? `<p class="text-p"><b>Father:</b> ${d('fname')}</p>` : ''}
                    <div class="h-line" style="color:#1e293b;">PROFILE <hr></div>
                    <p class="text-p">${d('obj') || 'I am a motivated...'}</p>
                    <div class="h-line" style="color:#1e293b;">EDUCATION <hr></div>
                    <p class="text-p">${d('edu')}</p>
                    <div class="h-line" style="color:#1e293b;">EXPERIENCE <hr></div>
                    <p class="text-p">${d('exp')}</p>
                    <div class="h-line" style="color:#1e293b;">PROJECTS <hr></div>
                    <p class="text-p">${d('proj')}\n${d('cert')}</p>
                </div>`;
        } else {
            // Layout for All Other 5 Designs
            box.className = 'layout-' + style;
            html = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <h1 style="font-size:28px;">${d('name') || 'Your Name'}</h1>
                        <p style="font-size:16px; color:#666;">${d('title')}</p>
                        <p class="text-p" style="margin-top:10px;">${d('phone')} | ${d('email')} | ${d('addr')}</p>
                        <p class="text-p">${d('fname') ? 'Father: '+d('fname') : ''} ${d('cnic') ? ' | CNIC: '+d('cnic') : ''}</p>
                    </div>
                    ${photo}
                </div>
                <div class="h-line" style="color:#333;">OBJECTIVE <hr></div>
                <p class="text-p">${d('obj')}</p>
                <div class="h-line" style="color:#333;">EDUCATION <hr></div>
                <p class="text-p">${d('edu')}</p>
                <div class="h-line" style="color:#333;">EXPERIENCE <hr></div>
                <p class="text-p">${d('exp')}</p>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div><div class="h-line" style="color:#333;">SKILLS <hr></div><p class="text-p">${d('skills')}</p></div>
                    <div><div class="h-line" style="color:#333;">LANGUAGES <hr></div><p class="text-p">${d('lang')}</p></div>
                </div>
                <div class="h-line" style="color:#333;">PROJECTS & CERTIFICATES <hr></div>
                <p class="text-p">${d('proj')}\n${d('cert')}</p>
            `;
        }
        box.innerHTML = html;
    }

    function startDL() {
        document.getElementById('ad-box').style.display = 'flex';
        setTimeout(() => { document.getElementById('dl-final').style.display = 'inline-block'; }, 2000);
    }

    function genPDF() {
        document.getElementById('ad-box').style.display = 'none';
        const el = document.getElementById('cv-box');
        html2pdf().set({
            margin: 0, filename: 'Professional_CV.pdf',
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(el).save();
    }
    update();
</script>
</body>
</html>
