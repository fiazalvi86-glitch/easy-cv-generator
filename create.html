<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master CV Maker - Ad Ready</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #f1c40f; --dark: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        /* Layout Centering */
        body { background: #525659; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .ad-banner { width: 100%; max-width: 728px; height: 90px; background: #fff; margin: 10px 0; display: flex; align-items: center; justify-content: center; color: #ccc; border: 1px solid #ddd; }
        
        #cv-container { 
            background: white; 
            width: 210mm; 
            min-height: 296mm; 
            display: flex; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            margin: 20px auto;
        }

        /* Responsive Scaling for Mobile */
        @media (max-width: 900px) {
            body { padding: 10px; }
            #cv-container { 
                transform: scale(calc(100vw / 210mm - 0.1)); 
                transform-origin: top center; 
                margin-bottom: -150mm; /* Fix for whitespace */
            }
        }

        /* Sidebar & Content */
        .side { width: 35%; background: var(--dark); color: white; padding: 15mm 8mm; }
        .main { width: 65%; background: white; padding: 15mm 10mm; color: #333; }

        .header-info h1 { color: var(--main); font-size: 28px; text-transform: uppercase; }
        .header-info p { font-size: 14px; margin-bottom: 2px; }
        .f-name { font-size: 12px; color: #cbd5e1; margin-bottom: 20px; font-style: italic; }

        .sec-title { display: flex; align-items: center; gap: 10px; margin: 20px 0 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .sec-title i { color: var(--main); }
        
        /* Ad Buttons */
        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 999; }
        .btn { padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-ad { background: #e74c3c; color: white; }
        .btn-dl { background: #27ae60; color: white; }
    </style>
</head>
<body>

    <div class="ad-banner">ADSENSE BANNER HERE</div>

    <div id="cv-container">
        <div class="side">
            <div id="photo-area" style="text-align:center; margin-bottom:20px;">
                <div style="width:140px; height:140px; border-radius:50%; border:5px solid var(--main); background:#444; margin:0 auto;"></div>
            </div>
            
            <div class="header-info">
                <h1 id="out-name">FIAZ</h1>
                <p id="out-title">Professional Developer</p>
                <div id="out-fname">S/O: Father's Name Here</div>
            </div>
            
            <div class="sec-title"><i class="fas fa-phone"></i> <h3>Contact</h3></div>
            <p style="font-size:12px;">+92 3xx xxxxxxx</p>
        </div>

        <div class="main">
            <div class="sec-title"><i class="fas fa-user"></i> <h3>Profile</h3></div>
            <p style="font-size:13px;">Enter your summary here...</p>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-ad"><i class="fas fa-play"></i> Watch Ad to Unlock</button>
        <button class="btn btn-dl" onclick="downloadPDF()"><i class="fas fa-download"></i> Download HQ PDF</button>
    </div>

    <script>
        function downloadPDF() {
            const element = document.getElementById('cv-container');
            html2pdf().set({
                margin: 0,
                filename: 'Premium_CV.pdf',
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(element).save();
        }
    </script>
</body>
</html>
