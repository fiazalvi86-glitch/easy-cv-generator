<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro CV Maker - Mobile Optimized</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; overflow-x: hidden; }

        /* App Container */
        .app-container { display: flex; height: 100vh; overflow: hidden; }
        .editor-side { width: 35%; background: white; padding: 20px; overflow-y: auto; border-right: 1px solid #ddd; }
        .preview-side { width: 65%; background: #525659; display: flex; justify-content: center; overflow-y: auto; padding: 40px 20px; }

        /* Mobile Optimization (Tabs & Scaling) */
        @media (max-width: 900px) {
            .app-container { flex-direction: column; height: 100vh; }
            .editor-side { width: 100%; height: calc(100vh - 60px); display: block; }
            .preview-side { width: 100%; height: calc(100vh - 60px); display: none; padding: 10px; align-items: flex-start; justify-content: center; overflow: auto; }
            
            /* CV Scaling for Mobile Screen */
            #cv-render { 
                transform: scale(0.42); 
                transform-origin: top center; 
                margin: 0 auto;
                box-shadow: none;
            }
            
            .mobile-tabs { display: flex; height: 60px; background: white; border-top: 2px solid #ddd; position: fixed; bottom: 0; width: 100%; z-index: 1000; }
            .tab-btn { flex: 1; border: none; background: none; font-weight: 600; font-size: 14px; color: #666; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
            .tab-btn i { font-size: 18px; margin-bottom: 2px; }
            .tab-btn.active { color: #2563eb; }
        }

        @media (min-width: 901px) { .mobile-tabs { display: none; } }

        /* Editor Styles */
        .section-title { background: #eef2ff; padding: 10px; border-radius: 6px; margin: 20px 0 10px; font-weight: 600; color: #1e40af; border-left: 4px solid #2563eb; font-size: 13px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        
        /* CV Render (A4) */
        #cv-render { 
            background: white; 
            width: 210mm; 
            min-height: 296mm; 
            display: block; 
            position: relative; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
        }

        /* Image Crop/Fit Style */
        .cv-photo { 
            width: 130px; height: 130px; 
            border-radius: 10px; 
            object-fit: cover; /* This fixes the stretching/distortion */
            object-position: center; 
            border: 3px solid #ffc107; 
            background: #eee;
            display: block;
            margin: 0 auto 20px;
        }

        /* Design Specifics */
        .d-sidebar { display: grid; grid-template-columns: 35% 65%; min-height: 296mm; }
        .d-sidebar .left { background: #1e293b; color: white; padding: 20mm 10mm; }
        .d-sidebar .right { padding: 20mm 12mm; background: white; }
        .cv-header-line { display: flex; align-items: center; gap: 10px; margin: 15px 0 10px; color: #ffc107; font-weight: 600; }
        .cv-header-line hr { flex: 1; border: 0; border-top: 1px solid #ddd; opacity: 0.3; }

        .download-btn { width: 100%; background: #059669; color: white; padding: 18px; border: none; border-radius: 10px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        
        /* Ad Modal */
        #ad-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; color: white; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="editor-side" id="edit-p">
        <h2 style="margin-bottom:15px;">CV Generator</h2>
        
        <div class="section-title">Design & Photo</div>
        <select id="sel-design" onchange="setD(this.value)">
            <option value="sidebar">Modern Sidebar</option>
            <option value="classic">Classic Navy</option>
            <option value="minimal">Minimalist</option>
            <option value="exec">Executive Gold</option>
        </select>
        <p style="font-size:12px; color:#666; margin-bottom:5px;">Upload Profile Photo:</p>
        <input type="file" accept="image/*" onchange="loadI(event)">

        <div class="section-title">Personal Details</div>
        <input type="text" id="in-name" placeholder="Full Name" oninput="upd()">
        <input type="text" id="in-fname" placeholder="Father Name" oninput="upd()">
        <input type="text" id="in-phone" placeholder="Phone (e.g. 0300-1234567)" oninput="upd()">
        <input type="text" id="in-email" placeholder="Email Address" oninput="upd()">
        <input type="text" id="in-addr" placeholder="City Address" oninput="upd()">
        <input type="text" id="in-cnic" placeholder="CNIC (Optional)" oninput="upd()">

        <div class="section-title">Education & Experience</div>
        <textarea id="in-edu" placeholder="Matric/Inter - School - Year" rows="3" oninput="upd()"></textarea>
        <textarea id="in-exp" placeholder="Job Title - Company - Duration" rows="3" oninput="upd()"></textarea>

        <div class="section-title">Skills & Languages</div>
        <input type="text" id="in-skills" placeholder="Skills (MS Word, Excel)" oninput="upd()">
        <input type="text" id="in-lang" placeholder="Languages (Urdu, English)" oninput="upd()">

        <button class="download-btn" onclick="showA()">Download CV (PDF)</button>
        <div style="height:80px"></div> </div>

    <div class="preview-side" id="view-p">
        <div id="cv-render" class="d-sidebar">
            </div>
    </div>
</div>

<div class="mobile-tabs">
    <button class="tab-btn active" id="btn-edit" onclick="switchT('edit')"><i class="fas fa-edit"></i>Info</button>
    <button class="tab-btn" id="btn-view" onclick="switchT('view')"><i class="fas fa-eye"></i>Preview</button>
</div>

<div id="ad-modal">
    <div style="background:white; padding:30px; border-radius:15px; color:black; width:90%; max-width:350px;">
        <h3>Generating PDF...</h3>
        <div style="height:200px; background:#f3f4f6; margin:20px 0; border:1px dashed #ccc; display:flex; align-items:center; justify-content:center;">Ad Slot</div>
        <button id="dl-ready" style="display:none; padding:12px 25px; background:#2563eb; color:white; border:none; border-radius:5px;" onclick="makePDF()">Download Now</button>
    </div>
</div>

<script>
    let currentD = 'sidebar';
    let userImg = '';

    function switchT(t) {
        document.getElementById('edit-p').style.display = (t === 'edit') ? 'block' : 'none';
        document.getElementById('view-p').style.display = (t === 'view') ? 'flex' : 'none';
        document.getElementById('btn-edit').classList.toggle('active', t === 'edit');
        document.getElementById('btn-view').classList.toggle('active', t === 'view');
    }

    function setD(val) { currentD = val; upd(); }

    function loadI(e) {
        const reader = new FileReader();
        reader.onload = () => { userImg = reader.result; upd(); };
        reader.readAsDataURL(e.target.files[0]);
    }

    function upd() {
        const v = (id) => document.getElementById(id).value;
        const render = document.getElementById('cv-render');
        render.className = 'd-' + currentD;

        const photoHtml = userImg ? `<img src="${userImg}" class="cv-photo">` : `<div class="cv-photo" style="display:flex; align-items:center; justify-content:center; color:#999; font-size:12px;">No Photo</div>`;

        let html = '';
        if(currentD === 'sidebar') {
            html = `
                <div class="left">
                    ${photoHtml}
                    <div class="cv-header-line">CONTACT <hr></div>
                    <p style="font-size:12px; margin-bottom:5px;">${v('in-phone') || '0300-0000000'}</p>
                    <p style="font-size:12px; margin-bottom:5px;">${v('in-email') || 'user@mail.com'}</p>
                    <p style="font-size:12px; margin-bottom:5px;">${v('in-addr') || 'City, Pakistan'}</p>
                    ${v('in-cnic') ? `<p style="font-size:11px; opacity:0.8;">CNIC: ${v('in-cnic')}</p>` : ''}
                    
                    <div class="cv-header-line">SKILLS <hr></div>
                    <p style="font-size:12px; white-space:pre-line;">${v('in-skills') || 'Your Skills'}</p>
                    
                    <div class="cv-header-line">LANGUAGES <hr></div>
                    <p style="font-size:12px;">${v('in-lang') || 'Urdu, English'}</p>
                </div>
                <div class="right">
                    <h1 style="font-size:32px;">${v('in-name') || 'Your Name'}</h1>
                    <p style="font-size:18px; color:#666; margin-bottom:15px;">${v('in-title') || 'Job Title'}</p>
                    ${v('in-fname') ? `<p style="font-size:14px; margin-bottom:20px;"><b>Father Name:</b> ${v('in-fname')}</p>` : ''}
                    
                    <div class="cv-header-line" style="color:#1e293b;">OBJECTIVE <hr></div>
                    <p style="font-size:13px; line-height:1.6;">${v('in-obj') || 'Seek opportunity to grow...'}</p>
                    
                    <div class="cv-header-line" style="color:#1e293b;">EDUCATION <hr></div>
                    <p style="font-size:13px; white-space:pre-line;">${v('in-edu') || 'Education info...'}</p>
                    
                    <div class="cv-header-line" style="color:#1e293b;">EXPERIENCE <hr></div>
                    <p style="font-size:13px; white-space:pre-line;">${v('in-exp') || 'Experience info...'}</p>
                </div>`;
        } else {
            // Basic Single Column for others
            html = `<div style="padding:15mm;">
                <div style="display:flex; justify-content:space-between;">
                    <div><h1>${v('in-name') || 'Your Name'}</h1><p>${v('in-title')}</p></div>
                    ${photoHtml}
                </div>
                <hr style="margin:15px 0;">
                <p><b>Phone:</b> ${v('in-phone')} | <b>Email:</b> ${v('in-email')}</p>
                <div class="cv-header-line" style="color:#333;">EDUCATION <hr></div>
                <p style="white-space:pre-line;">${v('in-edu')}</p>
                <div class="cv-header-line" style="color:#333;">EXPERIENCE <hr></div>
                <p style="white-space:pre-line;">${v('in-exp')}</p>
            </div>`;
        }
        render.innerHTML = html;
    }

    function showA() {
        document.getElementById('ad-modal').style.display = 'flex';
        setTimeout(() => { document.getElementById('dl-ready').style.display = 'inline-block'; }, 2000);
    }

    function makePDF() {
        document.getElementById('ad-modal').style.display = 'none';
        const element = document.getElementById('cv-render');
        html2pdf().set({
            margin: 0, filename: 'My_Professional_CV.pdf',
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(element).save();
    }
    upd(); // Initial Run
</script>
</body>
</html>
