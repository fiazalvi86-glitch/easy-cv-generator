<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium CV Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }

        /* Tabs for Mobile */
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: 600; color: #666; font-size: 14px; }
        .tab.active { color: #f39c12; border-bottom: 3px solid #f39c12; }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .editor { width: 35%; background: white; padding: 20px; overflow-y: auto; border-right: 1px solid #ddd; }
        .preview { width: 65%; background: #525659; overflow-y: auto; padding: 30px 10px; display: flex; justify-content: center; }

        /* --- CV DESIGN (A4) --- */
        #cv-box { 
            background: white; 
            width: 210mm; 
            min-height: 296mm; 
            display: flex; 
            box-shadow: 0 0 20px rgba(0,0,0,0.4); 
            position: relative;
        }

        /* Sidebar (Dark) */
        .sidebar { width: 35%; background: #2c3e50; color: white; padding: 10mm 7mm; }
        /* Main Content (White) */
        .main-content { width: 65%; background: white; padding: 10mm 10mm; color: #333; }

        /* Yellow Header Accent */
        .yellow-accent { height: 40px; background: #f1c40f; position: absolute; top: 0; left: 0; width: 100%; z-index: 0; }
        
        .profile-img-container { position: relative; z-index: 1; text-align: center; margin-bottom: 20px; }
        .photo { width: 140px; height: 140px; border-radius: 50%; border: 5px solid #f1c40f; object-fit: cover; background: #eee; }

        .name-title { margin-bottom: 30px; }
        .name-title h1 { color: #f1c40f; font-size: 28px; text-transform: uppercase; margin-bottom: 5px; }
        .name-title p { color: white; font-size: 16px; letter-spacing: 1px; }

        .section-h { display: flex; align-items: center; gap: 10px; margin: 20px 0 10px; }
        .icon-circle { width: 30px; height: 30px; background: #f1c40f; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #2c3e50; font-size: 14px; }
        .section-h h3 { font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        
        .sidebar .section-h h3 { color: #f1c40f; }
        .main-content .section-h h3 { color: #2c3e50; border-bottom: 2px solid #eee; flex: 1; padding-bottom: 5px; }

        .info-item { margin-bottom: 15px; font-size: 12px; }
        .info-item b { display: block; color: #f1c40f; margin-bottom: 2px; text-transform: uppercase; }

        .timeline-item { border-left: 2px solid #f1c40f; padding-left: 15px; margin-left: 14px; position: relative; margin-bottom: 20px; }
        .timeline-item::before { content: ''; width: 12px; height: 12px; background: #f1c40f; border-radius: 50%; position: absolute; left: -7px; top: 5px; }
        .timeline-item h4 { font-size: 15px; color: #2c3e50; }
        .timeline-item span { font-size: 12px; color: #7f8c8d; font-weight: 600; }
        .timeline-item p { font-size: 12px; margin-top: 5px; line-height: 1.5; color: #444; }

        /* Skill Bar */
        .skill-row { margin-bottom: 10px; }
        .skill-name { font-size: 12px; margin-bottom: 4px; display: block; }
        .bar-bg { height: 6px; background: #34495e; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; background: #f1c40f; width: 80%; }

        /* Mobile Fixes */
        @media (max-width: 900px) {
            .main-container { flex-direction: column; overflow: visible; }
            .editor, .preview { width: 100%; height: auto; display: none; }
            .active-p { display: block; }
            .preview.active-p { display: flex; background: #eee; padding: 20px 0; }
            
            #cv-box { 
                flex-direction: column; /* Mobile par sidebar upar chala jayega */
                transform: scale(calc(100vw / 210mm - 0.08)); 
                transform-origin: top center;
                margin-bottom: calc(296mm * (100vw / 210mm - 0.08) * -1 + 40px);
            }
            .sidebar, .main-content { width: 100%; }
        }

        .input-g { margin-bottom: 10px; }
        .input-g label { font-size: 11px; font-weight: bold; color: #2c3e50; display: block; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-top: 5px; }
        .btn-dl { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" onclick="switchT('edit', this)">1. Details</div>
    <div class="tab" onclick="switchT('view', this)">2. Preview</div>
</div>

<div class="main-container">
    <div class="editor active-p" id="edit-sec">
        <h3>CV Editor</h3>
        <div class="input-g">
            <label>Photo</label>
            <input type="file" accept="image/*" onchange="handlePhoto(event)">
        </div>
        <div class="input-g">
            <label>Full Name</label>
            <input type="text" id="in-name" placeholder="Nina Lane" oninput="upd()">
        </div>
        <div class="input-g">
            <label>Job Title</label>
            <input type="text" id="in-title" placeholder="Graphic Designer" oninput="upd()">
        </div>
        <div class="input-g">
            <label>Phone / Email / Address</label>
            <input type="text" id="in-phone" placeholder="Phone" oninput="upd()">
            <input type="text" id="in-email" placeholder="Email" oninput="upd()">
            <input type="text" id="in-addr" placeholder="Address" oninput="upd()">
        </div>
        <div class="input-g">
            <label>Profile Objective</label>
            <textarea id="in-obj" rows="3" oninput="upd()"></textarea>
        </div>
        <div class="input-g">
            <label>Experience (Job - Company - Date)</label>
            <textarea id="in-exp" rows="4" oninput="upd()"></textarea>
        </div>
        <div class="input-g">
            <label>Education</label>
            <textarea id="in-edu" rows="3" oninput="upd()"></textarea>
        </div>
        <div class="input-g">
            <label>Skills (comma separated)</label>
            <input type="text" id="in-skills" placeholder="Photoshop, Illustrator" oninput="upd()">
        </div>

        <button class="btn-dl" onclick="download()">Download PDF</button>
        <div style="height:60px;"></div>
    </div>

    <div class="preview" id="view-sec">
        <div id="cv-box">
            <div class="yellow-accent"></div>
            
            <div class="sidebar">
                <div class="profile-img-container">
                    <div id="photo-box">
                        <img src="" class="photo" id="cv-photo" style="display:none;">
                        <div id="photo-placeholder" style="width:140px; height:140px; border-radius:50%; background:#34495e; border:5px solid #f1c40f; margin:0 auto; display:flex; align-items:center; justify-content:center; color:white;">Photo</div>
                    </div>
                </div>

                <div class="name-title">
                    <h1 id="out-name">NINA LANE</h1>
                    <p id="out-title">GRAPHIC DESIGNER</p>
                </div>

                <div class="section-h">
                    <div class="icon-circle"><i class="fas fa-phone"></i></div>
                    <h3>Contact</h3>
                </div>
                <div class="info-item"><b>Phone</b><span id="out-phone">+1 234 567 890</span></div>
                <div class="info-item"><b>Email</b><span id="out-email">nina.lane@mail.com</span></div>
                <div class="info-item"><b>Address</b><span id="out-addr">New York, NY</span></div>

                <div class="section-h">
                    <div class="icon-circle"><i class="fas fa-lightbulb"></i></div>
                    <h3>Skills</h3>
                </div>
                <div id="skills-list"></div>
            </div>

            <div class="main-content">
                <div class="section-h">
                    <div class="icon-circle"><i class="fas fa-user"></i></div>
                    <h3>Profile</h3>
                </div>
                <p class="txt" id="out-obj" style="margin-bottom:25px; color:#555;">Creative graphic designer with 5+ years experience...</p>

                <div class="section-h">
                    <div class="icon-circle"><i class="fas fa-briefcase"></i></div>
                    <h3>Experience</h3>
                </div>
                <div id="exp-list"></div>

                <div class="section-h">
                    <div class="icon-circle"><i class="fas fa-graduation-cap"></i></div>
                    <h3>Education</h3>
                </div>
                <div id="edu-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let photoData = "";

    function switchT(t, b) {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        document.getElementById('edit-sec').classList.toggle('active-p', t === 'edit');
        document.getElementById('view-sec').classList.toggle('active-p', t === 'view');
    }

    function handlePhoto(e) {
        const reader = new FileReader();
        reader.onload = () => {
            photoData = reader.result;
            const img = document.getElementById('cv-photo');
            img.src = photoData;
            img.style.display = 'block';
            document.getElementById('photo-placeholder').style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function upd() {
        const val = (id) => document.getElementById(id).value;
        document.getElementById('out-name').innerText = val('in-name') || "YOUR NAME";
        document.getElementById('out-title').innerText = val('in-title') || "PROFESSIONAL TITLE";
        document.getElementById('out-phone').innerText = val('in-phone') || "03xx-xxxxxxx";
        document.getElementById('out-email').innerText = val('in-email') || "user@mail.com";
        document.getElementById('out-addr').innerText = val('in-addr') || "City, Pakistan";
        document.getElementById('out-obj').innerText = val('in-obj') || "Enter your profile objective here...";

        // Skills List
        const skills = val('in-skills').split(',');
        let sHtml = '';
        skills.forEach(s => {
            if(s.trim()) sHtml += `<div class="skill-row"><span class="skill-name">${s.trim()}</span><div class="bar-bg"><div class="bar-fill"></div></div></div>`;
        });
        document.getElementById('skills-list').innerHTML = sHtml;

        // Experience List (Split by new line)
        const exps = val('in-exp').split('\n');
        let eHtml = '';
        exps.forEach(e => {
            if(e.trim()) eHtml += `<div class="timeline-item"><h4>Job Role</h4><span>${e.trim()}</span><p>Description of duties and achievements.</p></div>`;
        });
        document.getElementById('exp-list').innerHTML = eHtml;

        // Education List
        const edus = val('in-edu').split('\n');
        let edHtml = '';
        edus.forEach(ed => {
            if(ed.trim()) edHtml += `<div class="timeline-item"><h4>Education Degree</h4><span>${ed.trim()}</span></div>`;
        });
        document.getElementById('edu-list').innerHTML = edHtml;
    }

    function download() {
        const element = document.getElementById('cv-box');
        html2pdf().set({
            margin: 0, filename: 'Modern_Premium_CV.pdf',
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(element).save();
    }
    upd();
</script>
</body>
</html>
