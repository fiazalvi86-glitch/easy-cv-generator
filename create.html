<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite CV Maker - Ultra High Quality</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }

        .tabs { display: flex; background: #fff; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #666; }
        .tab.active { color: #f1c40f; border-bottom: 3px solid #f1c40f; }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .editor { width: 35%; background: white; padding: 20px; overflow-y: auto; border-right: 1px solid #ddd; }
        .preview { width: 65%; background: #333; overflow-y: auto; padding: 20px; display: flex; justify-content: center; }

        /* --- CROPPER MODAL --- */
        #crop-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #cropper-v { width: 300px; height: 300px; }
        .crop-btn { padding: 10px 25px; background: #f1c40f; border: none; color: #000; font-weight: bold; margin-top: 20px; border-radius: 5px; cursor: pointer; }

        /* --- CV BOX (A4) --- */
        #cv-box { 
            background: white; 
            width: 210mm; 
            min-height: 296mm; 
            display: flex !important; 
            flex-direction: row !important;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .sidebar { width: 35%; background: #2c3e50; color: white; padding: 10mm 5mm; }
        .main-content { width: 65%; background: white; padding: 10mm 8mm; color: #333; }

        .photo-wrap { text-align: center; margin-bottom: 20px; }
        .photo-res { width: 130px; height: 130px; border-radius: 50%; border: 4px solid #f1c40f; object-fit: cover; background: #444; margin: 0 auto; display: block; }

        .sec-h { display: flex; align-items: center; gap: 8px; margin: 15px 0 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .main-content .sec-h { border-bottom: 2px solid #f0f0f0; color: #2c3e50; }
        .sec-h i { color: #f1c40f; }

        .info-b { margin-bottom: 10px; font-size: 12px; }
        .info-b b { color: #f1c40f; display: block; font-size: 11px; text-transform: uppercase; }

        .t-item { border-left: 2px solid #f1c40f; padding-left: 15px; margin-left: 10px; position: relative; margin-bottom: 15px; }
        .t-item::before { content: ''; width: 10px; height: 10px; background: #f1c40f; border-radius: 50%; position: absolute; left: -6px; top: 5px; }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; overflow: visible; }
            .editor, .preview { width: 100%; display: none; }
            .active-p { display: block; }
            .preview.active-p { display: flex; background: #222; padding: 10px 0; overflow-x: auto; justify-content: flex-start; }
            #cv-box { transform: scale(calc(100vw / 210mm)); transform-origin: top left; margin-bottom: calc(296mm * (100vw / 210mm) * -1 + 20px); }
        }

        /* Form styling */
        .g { margin-bottom: 12px; }
        label { font-size: 11px; font-weight: bold; color: #333; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; margin-top: 3px; }
        .dl-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" onclick="sw('edit', this)">1. Details</div>
    <div class="tab" onclick="sw('view', this)">2. Preview</div>
</div>

<div id="crop-modal">
    <div id="cropper-v"></div>
    <button class="crop-btn" onclick="applyCrop()">Crop & Save Photo</button>
</div>

<div class="main-container">
    <div class="editor active-p" id="e-sec">
        <div class="g"><label>Upload Photo (Crop Option Will Appear)</label><input type="file" id="upload" accept="image/*"></div>
        <div class="g"><label>Full Name</label><input type="text" id="i-name" oninput="u()"></div>
        <div class="g"><label>Father Name</label><input type="text" id="i-fname" oninput="u()"></div>
        <div class="g"><label>Job Title</label><input type="text" id="i-title" oninput="u()"></div>
        <div class="g"><label>Contact (Phone, Email, Address, CNIC)</label>
            <input type="text" id="i-ph" placeholder="Phone" oninput="u()">
            <input type="text" id="i-em" placeholder="Email" oninput="u()">
            <input type="text" id="i-ad" placeholder="City" oninput="u()">
            <input type="text" id="i-cn" placeholder="CNIC" oninput="u()">
        </div>
        <div class="g"><label>Profile Objective</label><textarea id="i-obj" rows="2" oninput="u()"></textarea></div>
        <div class="g"><label>Work Experience</label><textarea id="i-exp" rows="3" oninput="u()"></textarea></div>
        <div class="g"><label>Education</label><textarea id="i-edu" rows="3" oninput="u()"></textarea></div>
        <div class="g"><label>Skills</label><input type="text" id="i-sk" oninput="u()"></div>

        <button class="dl-btn" onclick="dl()">High-Quality Download</button>
        <div style="height:50px;"></div>
    </div>

    <div class="preview" id="v-sec">
        <div id="cv-box">
            <div class="sidebar">
                <div class="photo-wrap">
                    <img src="" id="o-img" class="photo-res" style="display:none;">
                    <div id="o-placeholder" style="width:130px;height:130px;border-radius:50%;background:#444;margin:0 auto;display:flex;align-items:center;justify-content:center;border:4px solid #f1c40f;"><i class="fas fa-user fa-3x"></i></div>
                </div>
                <h1 id="o-name" style="font-size:22px; color:#f1c40f;">YOUR NAME</h1>
                <p id="o-title" style="font-size:14px; margin-bottom:20px;">Title</p>

                <div class="sec-h"><i class="fas fa-phone"></i> <h3>Contact</h3></div>
                <div class="info-b"><b>Phone</b><span id="o-ph">---</span></div>
                <div class="info-b"><b>Email</b><span id="o-em">---</span></div>
                <div class="info-b"><b>Address</b><span id="o-ad">---</span></div>
                <div class="info-b"><b>CNIC</b><span id="o-cn">---</span></div>

                <div class="sec-h"><i class="fas fa-tools"></i> <h3>Skills</h3></div>
                <div id="o-sk" style="font-size:11px;"></div>
            </div>

            <div class="main-content">
                <div class="sec-h"><i class="fas fa-user-circle"></i> <h3>Profile</h3></div>
                <p id="o-obj" style="font-size:12px; margin-bottom:20px;">Objective...</p>

                <div class="sec-h"><i class="fas fa-briefcase"></i> <h3>Experience</h3></div>
                <div id="o-exp"></div>

                <div class="sec-h"><i class="fas fa-graduation-cap"></i> <h3>Education</h3></div>
                <div id="o-edu"></div>

                <div style="margin-top:20px; border-top:1px solid #eee; padding-top:10px;">
                    <p style="font-size:12px;"><b>Father Name:</b> <span id="o-fname">---</span></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let croppieInst;
    const uploadInput = document.getElementById('upload');

    // Tab Switch
    function sw(t, b) {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        document.getElementById('e-sec').classList.toggle('active-p', t === 'edit');
        document.getElementById('v-sec').classList.toggle('active-p', t === 'view');
    }

    // Image Upload & Crop Trigger
    uploadInput.addEventListener('change', function() {
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('crop-modal').style.display = 'flex';
            if (croppieInst) croppieInst.destroy();
            croppieInst = new Croppie(document.getElementById('cropper-v'), {
                viewport: { width: 150, height: 150, type: 'circle' },
                boundary: { width: 250, height: 250 },
                showZoomer: true
            });
            croppieInst.bind({ url: e.target.result });
        }
        reader.readAsDataURL(this.files[0]);
    });

    function applyCrop() {
        croppieInst.result({ type: 'base64', size: 'viewport', format: 'jpeg' }).then(res => {
            const img = document.getElementById('o-img');
            img.src = res;
            img.style.display = 'block';
            document.getElementById('o-placeholder').style.display = 'none';
            document.getElementById('crop-modal').style.display = 'none';
        });
    }

    // Live Update
    function u() {
        const g = (id) => document.getElementById(id).value;
        document.getElementById('o-name').innerText = g('i-name') || "YOUR NAME";
        document.getElementById('o-fname').innerText = g('i-fname') || "---";
        document.getElementById('o-title').innerText = g('i-title') || "Job Title";
        document.getElementById('o-ph').innerText = g('i-ph') || "---";
        document.getElementById('o-em').innerText = g('i-em') || "---";
        document.getElementById('o-ad').innerText = g('i-ad') || "---";
        document.getElementById('o-cn').innerText = g('i-cn') || "---";
        document.getElementById('o-obj').innerText = g('i-obj') || "Objective...";

        const list = (id, target) => {
            const lines = g(id).split('\n');
            let h = '';
            lines.forEach(l => { if(l.trim()) h += `<div class="t-item"><b>${l.trim()}</b><p>Details and achievements.</p></div>`; });
            document.getElementById(target).innerHTML = h;
        };
        list('i-exp', 'o-exp');
        list('i-edu', 'o-edu');
        
        const sks = g('i-sk').split(',');
        document.getElementById('o-sk').innerHTML = sks.map(s => s.trim() ? `• ${s.trim()}<br>` : '').join('');
    }

    // Fix High Quality Download
    function dl() {
        const element = document.getElementById('cv-box');
        // Force rendering and wait a bit
        element.style.transform = "none"; 
        
        const opt = {
            margin: 0,
            filename: 'Professional_CV.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { 
                scale: 3, 
                useCORS: true, 
                logging: false,
                letterRendering: true,
                windowWidth: 1200 
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).toPdf().get('pdf').then((pdf) => {
            // After PDF generation, restore scaling if on mobile
            if(window.innerWidth < 900) {
                u(); // Refresh view
            }
        }).save();
    }
    u();
</script>
</body>
</html>
