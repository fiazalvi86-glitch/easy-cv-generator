<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Professional CV - 2030 Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #007bff; --dark: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* Form Styling */
        .editor-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        /* Design Selection */
        .design-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .design-opt { padding: 10px; border: 2px solid #eee; border-radius: 8px; text-align: center; cursor: pointer; font-size: 14px; }
        .design-opt.active { border-color: var(--primary); background: #eef6ff; }

        /* Preview Area (A4 Look) */
        .preview-container { overflow-x: auto; background: #ddd; padding: 20px; border-radius: 10px; }
        #cv-preview { background: white; width: 210mm; min-height: 297mm; padding: 20mm; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.2); transition: 0.3s; }

        /* CV Styles (6 Types) */
        .design-minimal { color: #333; }
        .design-modern { border-top: 15px solid var(--primary); }
        .design-executive { border-left: 20mm solid #2c3e50; padding-left: 10mm !important; }
        .design-creative { background: #fffaf0; color: #d35400; }
        .design-tech { background: #1a1a1a; color: #00ff00; } /* Matrix/Tech Look */
        .design-bold { background: linear-gradient(135deg, #6e8efb, #a777e3); color: white; }

        /* Image Resize */
        .cv-photo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 10px; }

        /* Download Button */
        .download-btn { width: 100%; background: #28a745; color: white; padding: 18px; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3); }

        /* Ad Pop-up Modal */
        #ad-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; color: white; text-align: center; }
        
        @media (max-width: 768px) { #cv-preview { transform: scale(0.4); transform-origin: top left; } .preview-container { height: 400px; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="editor-card">
            <h2>Step 1: Details Enter Karein</h2>
            <input type="file" accept="image/*" onchange="loadPhoto(event)">
            <input type="text" id="name" placeholder="Pura Naam" oninput="update()">
            <input type="text" id="job" placeholder="Profession (e.g. Graphic Designer)" oninput="update()">
            <textarea id="summary" placeholder="Apne baare mein likhein..." rows="3" oninput="update()"></textarea>
            <input type="text" id="skills" placeholder="Skills (Example: HTML, CSS, Sales)" oninput="update()">
            
            <h3>Step 2: Design Select Karein</h3>
            <div class="design-picker">
                <div class="design-opt active" onclick="setDesign('minimal', this)">Minimal</div>
                <div class="design-opt" onclick="setDesign('modern', this)">Modern</div>
                <div class="design-opt" onclick="setDesign('executive', this)">Executive</div>
                <div class="design-opt" onclick="setDesign('creative', this)">Creative</div>
                <div class="design-opt" onclick="setDesign('tech', this)">Tech</div>
                <div class="design-opt" onclick="setDesign('bold', this)">Bold</div>
            </div>
        </div>

        <div class="preview-container">
            <div id="cv-preview" class="design-minimal">
                <img id="outPhoto" class="cv-photo" src="https://via.placeholder.com/100">
                <h1 id="outName">Aapka Naam</h1>
                <h3 id="outJob" style="color: var(--primary)">Job Title</h3>
                <p id="outSummary">Professional summary yahan nazar aayegi...</p>
                <hr>
                <h4>Skills</h4>
                <p id="outSkills">Aapki skills yahan ayengi.</p>
            </div>
        </div>

        <button class="download-btn" onclick="showAd()">Download CV (PDF)</button>
    </div>

    <div id="ad-modal">
        <div>
            <h2>Processing Your PDF...</h2>
            <div style="width: 300px; height: 250px; background: #fff; color: #000; line-height: 250px; margin: 20px auto;">
                [Google AdSense Ad Slot]
            </div>
            <p>Wait 3 seconds...</p>
            <button id="close-ad" style="display:none; padding: 10px 20px;" onclick="finishDownload()">Download Now</button>
        </div>
    </div>

    <script>
        function update() {
            document.getElementById('outName').innerText = document.getElementById('name').value || 'Aapka Naam';
            document.getElementById('outJob').innerText = document.getElementById('job').value || 'Job Title';
            document.getElementById('outSummary').innerText = document.getElementById('summary').value || 'Summary...';
            document.getElementById('outSkills').innerText = document.getElementById('skills').value || 'Skills...';
        }

        function loadPhoto(event) {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('outPhoto').src = reader.result;
            reader.readAsDataURL(event.target.files[0]);
        }

        function setDesign(style, el) {
            document.querySelectorAll('.design-opt').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('cv-preview').className = 'design-' + style;
        }

        function showAd() {
            document.getElementById('ad-modal').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('close-ad').style.display = 'inline-block';
            }, 3000); // 3 seconds wait for Ad
        }

        function finishDownload() {
            document.getElementById('ad-modal').style.display = 'none';
            const element = document.getElementById('cv-preview');
            const opt = {
                margin: 0,
                filename: 'My_CV_2030.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
